services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: forum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    image: ghcr.io/devops-projectlevel/pyforum-nazarlx:${IMAGE_TAG}
    command: >
      sh -c "
      ./wait-for-db.sh &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn forum_sandbox.wsgi:application -c gunicorn.conf.py
      "
    env_file:
      - .env.prod
    depends_on:
      - db
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      web:
volumes:
  postgres_data:
  static_data:
  media_data:
